spring:
  datasource:
    url: jdbc:h2:mem:tradelab;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
  boot:
    admin:
      context-path: /admin   # Spring Boot Admin UI served at /admin
      client:
        url: http://localhost:8080/admin      # Admin server registration endpoint
        instance:
          service-url: http://localhost:8080  # Base URL the Admin server uses to scrape actuator data

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include:
          - health
          - info
          - metrics
          - mappings
          - env
          - beans
          - loggers
          - threaddump
          - conditions
  endpoint:
    health:
      show-details: always
    env:
      show-values: never   # never expose secret property values
  info:
    env:
      enabled: true

info:
  app:
    name: trade-lab
    description: Paper trading platform
